<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Viaje 2026">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Estambul · Capadocia · Atenas · Naxos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sea:#0a3d52; --sea2:#125a78; --aegean:#1b8aa6; --turq:#22b4c4;
    --sand:#f6efe2; --paper:#fbf7ef; --ink:#10242c; --muted:#5d7681;
    --line:rgba(10,61,82,.12); --gold:#d39a3e; --rose:#d98a6a; --orbital:#07d4a1;
    --good:#1f9d76; --bad:#d05a4e; --warn:#cf8a2c;
    --card:#ffffff; --shadow:0 6px 24px rgba(10,61,82,.10);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding-bottom:calc(76px + var(--safe-b));
  }
  h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}
  a{color:var(--aegean);text-decoration:none}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(160deg,#0a3d52,#125a78);
    color:#fff;padding:calc(12px + var(--safe-t)) 0 12px;
    box-shadow:0 4px 18px rgba(10,61,82,.25);
  }
  .head-inner{padding:0 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand .eyebrow{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:#9fd6e2;font-weight:600}
  .brand h1{font-size:17px;margin:2px 0 0;font-weight:600;line-height:1.15}
  .count{
    text-align:right;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    border-radius:14px;padding:6px 12px;min-width:74px;backdrop-filter:blur(4px)
  }
  .count .num{font-family:'Fraunces',serif;font-size:22px;font-weight:700;line-height:1}
  .count .lbl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#cdeaf1}

  /* ---------- Bottom nav ---------- */
  .bnav{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;
    background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-top:1px solid var(--line);
    padding:7px 4px calc(7px + var(--safe-b));box-shadow:0 -4px 20px rgba(10,61,82,.08)}
  .bnav button{flex:1;border:0;background:none;font-family:inherit;display:flex;flex-direction:column;
    align-items:center;gap:3px;padding:4px 2px;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:.15s}
  .bnav button .bi{opacity:.65;transition:.15s;display:grid;place-items:center}
  .bnav button.on{color:var(--aegean)}
  .bnav button.on .bi{opacity:1;transform:translateY(-1px)}

  /* offline bar */
  .offline-bar{position:fixed;left:0;right:0;bottom:calc(76px + var(--safe-b));z-index:55;
    background:var(--warn);color:#fff;text-align:center;font-size:12px;font-weight:600;
    padding:7px 12px;transform:translateY(150%);transition:transform .3s;box-shadow:0 -2px 12px rgba(0,0,0,.15)}
  .offline-bar.show{transform:none}

  /* ---------- Layout ---------- */
  main{max-width:680px;margin:0 auto;padding:16px 16px 30px}
  .view{display:none;animation:fade .25s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sec-title{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--aegean);font-weight:700;margin:22px 2px 10px}
  .sec-title:first-child{margin-top:4px}
  .backbar{display:inline-flex;align-items:center;gap:6px;color:var(--aegean);font-weight:600;font-size:13px;padding:2px 0 14px;cursor:pointer}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow);margin-bottom:12px}
  .card.flat{box-shadow:none}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
  .pill.ok{background:rgba(31,157,118,.13);color:var(--good)}
  .pill.pend{background:rgba(207,138,44,.15);color:var(--warn)}
  .pill.info{background:rgba(27,138,166,.12);color:var(--aegean)}
  .pill.pay{background:rgba(31,157,118,.13);color:var(--good)}

  /* map button */
  .mapbtn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:600;color:var(--aegean);background:rgba(27,138,166,.1);padding:8px 13px;border-radius:10px;margin-top:11px}

  /* ---------- Hoy ---------- */
  .cd-hero{border-radius:20px;overflow:hidden;position:relative;color:#fff;
    background:linear-gradient(150deg,#0a3d52 0%,#125a78 55%,#1b8aa6 100%);
    padding:22px 20px;box-shadow:var(--shadow);margin-bottom:14px;text-align:center}
  .cd-hero::after{content:"";position:absolute;right:-40px;top:-40px;width:170px;height:170px;border-radius:50%;background:radial-gradient(circle,rgba(34,180,196,.45),transparent 70%)}
  .cd-hero>*{position:relative}
  .cd-hero .eq{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#cdeaf1;font-weight:600}
  .cd-hero .big{font-family:'Fraunces',serif;font-size:60px;font-weight:700;line-height:.95;margin:6px 0 2px}
  .cd-hero .u{font-size:13px;color:#eaf6f9;font-weight:500}
  .cd-hero .dts{font-size:12.5px;color:#cdeaf1;margin-top:10px}
  .cd-hero .who{margin-top:14px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
  .ava{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:5px 11px 5px 5px;border-radius:999px;font-size:12.5px;font-weight:600}
  .ava i{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-style:normal;font-size:11px;font-weight:700;color:#05323f}

  .todayhero{border-radius:20px;overflow:hidden;position:relative;color:#fff;
    background:linear-gradient(150deg,#0a3d52,#1b8aa6);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:12px}
  .todayhero::after{content:"";position:absolute;right:-30px;top:-30px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(7,212,161,.35),transparent 70%)}
  .todayhero>*{position:relative}
  .todayhero .dd{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#cdeaf1;font-weight:700}
  .todayhero h2{font-family:'Fraunces';font-size:27px;margin:4px 0 0;font-weight:600}
  .todayhero .meta{font-size:12.5px;color:#dff0f4;margin-top:7px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .todayhero .meta .chip{background:rgba(255,255,255,.15);border-radius:999px;padding:3px 10px;display:inline-flex;align-items:center;gap:5px}

  .nextup{display:flex;align-items:center;gap:13px;background:#fff;border:1px solid rgba(7,212,161,.4);border-left:4px solid var(--orbital);border-radius:14px;padding:13px 15px;margin-bottom:12px;box-shadow:var(--shadow)}
  .nextup .ni{width:40px;height:40px;border-radius:11px;background:rgba(7,212,161,.14);color:#0a9d78;display:grid;place-items:center;flex:0 0 auto}
  .nextup .nx{flex:1;min-width:0}
  .nextup .nx .k{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700}
  .nextup .nx b{font-size:15px;display:block;margin-top:1px}
  .nextup .nx span{font-size:12px;color:var(--muted)}

  .prep{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .pcard{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 14px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:11px}
  .pcard .pi{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
  .pcard .pv{font-family:'Fraunces';font-size:20px;font-weight:700;color:var(--sea);line-height:1}
  .pcard .pk{font-size:11px;color:var(--muted);margin-top:2px}

  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 12px;text-align:center;box-shadow:var(--shadow)}
  .stat .v{font-family:'Fraunces',serif;font-size:21px;font-weight:700;color:var(--sea)}
  .stat .k{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px;font-weight:600}

  .budget-hero{background:linear-gradient(135deg,#0a3d52,#1b8aa6);color:#fff;border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden}
  .budget-hero::after{content:"";position:absolute;right:-30px;bottom:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(7,212,161,.4),transparent 70%)}
  .budget-hero>*{position:relative}
  .budget-hero .bh-top{display:flex;justify-content:space-between;align-items:center}
  .budget-hero .bh-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cdeaf1;font-weight:600}
  .budget-hero .bh-rate{font-size:10.5px;color:#cdeaf1;background:rgba(255,255,255,.14);padding:3px 9px;border-radius:8px;font-weight:600}
  .budget-hero .bh-clp{font-family:'Fraunces',serif;font-size:33px;font-weight:700;line-height:1.05;margin-top:7px}
  .budget-hero .bh-eur{font-size:12.5px;color:#cdeaf1;margin-top:3px}
  .budget-hero .bh-pp{margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.18);font-size:13px;color:#eaf6f9;display:flex;align-items:baseline;gap:7px}
  .budget-hero .bh-pp b{font-family:'Fraunces',serif;font-size:17px}
  .budget-hero .bh-pp .sec{color:#bfe3ec;margin-left:auto;font-size:12px}

  .next li{list-style:none}
  .next ul{margin:0;padding:0}
  .next li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
  .next li:last-child{border-bottom:0}
  .next .tag{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--rose);padding:3px 8px;border-radius:7px;margin-top:1px}

  /* ---------- Itinerary ---------- */
  .day{margin-bottom:14px;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--card)}
  .day.istoday{border:1px solid rgba(7,212,161,.55);box-shadow:0 0 0 2px rgba(7,212,161,.18),var(--shadow)}
  .day-head{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;background:linear-gradient(100deg,rgba(27,138,166,.06),transparent)}
  .day-head .date{flex:0 0 auto;text-align:center;background:var(--sea);color:#fff;border-radius:12px;padding:6px 9px;min-width:46px}
  .day.istoday .day-head .date{background:var(--orbital);color:#05332a}
  .day-head .date .d{font-family:'Fraunces',serif;font-size:18px;font-weight:700;line-height:1}
  .day-head .date .mo{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#bfe3ec}
  .day.istoday .day-head .date .mo{color:#05332a}
  .day-head .ti{flex:1;min-width:0}
  .day-head .ti b{font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .day-head .ti span{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
  .day-head .hicon{display:inline-flex;align-items:center;gap:4px;color:var(--aegean)}
  .day-head .chev{transition:.25s;color:var(--aegean);flex:0 0 auto}
  .day.open .chev{transform:rotate(180deg)}
  .day-body{display:none;padding:4px 15px 14px}
  .day.open .day-body{display:block}
  .slot{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--line)}
  .slot .ic{flex:0 0 auto;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:rgba(27,138,166,.1);color:var(--aegean)}
  .slot .tx{flex:1;font-size:13.5px}
  .slot .tx b{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:block;font-weight:700}
  .slot .tx b.mealk{color:var(--gold)}
  .daynote{margin-top:11px;font-size:12.5px;color:var(--sea2);background:rgba(27,138,166,.07);border-left:3px solid var(--aegean);padding:9px 11px;border-radius:0 10px 10px 0}
  .badge-city{font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;padding:2px 8px;border-radius:7px}
  .hotelrow{display:flex;align-items:center;gap:10px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:13px}
  .hotelrow .hi{color:var(--aegean)}
  .hotelrow .ha{margin-left:auto}

  /* ---------- Flight / hotel cards ---------- */
  .fcard{position:relative}
  .froute{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .froute .ap{font-family:'Fraunces',serif;font-size:21px;font-weight:700}
  .froute .arr{flex:1;height:1px;background:linear-gradient(90deg,var(--line),var(--aegean),var(--line));position:relative}
  .froute .arr::after{content:"✈";position:absolute;right:-2px;top:-10px;color:var(--aegean);font-size:14px}
  .froute .arr .plus{position:absolute;left:50%;top:-9px;transform:translateX(-50%);font-size:10px;color:var(--muted);background:var(--card);padding:0 5px}
  .ftimes{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:10px}
  .ftimes b{color:var(--ink);font-size:13px}
  .fmeta{display:flex;flex-wrap:wrap;gap:7px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:9px}
  .fmeta b{color:var(--ink)}
  .hotel .hh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .hotel .hh h3{margin:0;font-size:17px}
  .hotel .stay{font-size:12px;color:var(--muted);margin-top:3px}
  .hotel .feat{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .feat .t{font-size:11.5px;background:rgba(10,61,82,.05);border:1px solid var(--line);padding:4px 9px;border-radius:8px;color:var(--sea2)}
  .booklink{display:inline-flex;align-items:center;gap:6px;margin-top:11px;margin-right:8px;font-size:13px;font-weight:600;background:rgba(27,138,166,.1);padding:8px 13px;border-radius:10px}

  /* ---------- Money ---------- */
  .balcard{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:14px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:10px}
  .balcard i{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-style:normal;font-weight:700;font-family:'Fraunces',serif;font-size:16px;color:#05323f;flex:0 0 auto}
  .balcard .nm{flex:1}
  .balcard .nm b{font-size:15px}
  .balcard .nm span{display:block;font-size:11.5px;color:var(--muted);margin-top:1px;max-width:32ch}
  .balcard .amt{text-align:right;font-family:'Fraunces',serif;font-weight:700;font-size:16px;white-space:nowrap}
  .amt.owe{color:var(--bad)} .amt.get{color:var(--good)}
  .transfer{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .transfer:last-child{border-bottom:0}
  .transfer .ar{color:var(--aegean);font-weight:700}
  .transfer .tamt{margin-left:auto;font-weight:700;font-family:'Fraunces',serif;color:var(--sea)}
  .bud{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .bud:last-child{border-bottom:0}
  .bud .bic{width:30px;height:30px;border-radius:9px;background:rgba(27,138,166,.1);color:var(--aegean);display:grid;place-items:center;flex:0 0 auto}
  .bud .bn{flex:1;font-size:13.5px}
  .bud .bn span{display:block;font-size:11px;color:var(--muted)}
  .bud .bv{font-weight:700;font-family:'Fraunces',serif;font-size:14.5px;white-space:nowrap}
  .total-bar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(120deg,#0a3d52,#1b8aa6);color:#fff;border-radius:14px;padding:14px 17px;margin-top:6px}
  .total-bar .tt{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#cdeaf1}
  .total-bar .tv{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
  .total-bar small{display:block;font-size:11px;color:#bfe3ec;text-transform:none;letter-spacing:0}
  .payitem{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .payitem:last-child{border-bottom:0}
  .payitem .pc{flex:1}
  .payitem .pc b{font-size:13.5px}
  .payitem .pc span{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
  .payitem .pv{text-align:right;white-space:nowrap}
  .payitem .pv b{font-family:'Fraunces',serif;font-size:14px}
  .paysum{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px}
  .paysum .bar{height:10px;border-radius:999px;background:rgba(208,90,78,.16);overflow:hidden;margin-bottom:10px}
  .paysum .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--good),#2fb6c4);transition:width .4s}
  .paysum .legend{display:flex;justify-content:space-between;font-size:12.5px}
  .paysum .legend .k{color:var(--muted)}
  .paysum .legend b{font-family:'Fraunces',serif;font-size:15px;display:block;margin-top:1px}
  .paysum .legend .paid b{color:var(--good)} .paysum .legend .pend b{color:var(--bad)}
  .paychk{display:flex;gap:11px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
  .paychk:last-child{border-bottom:0}
  .paychk .box{flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;transition:.15s;margin-top:1px;background:#fff}
  .paychk.done .box{background:var(--good);border-color:var(--good)}
  .paychk .box svg{opacity:0;transition:.15s}
  .paychk.done .box svg{opacity:1}
  .paychk .pc{flex:1;min-width:0}
  .paychk .pc b{font-size:13.5px}
  .paychk .pc span{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
  .paychk .pv{text-align:right;white-space:nowrap;font-family:'Fraunces',serif;font-weight:700;font-size:14px;color:var(--bad)}
  .paychk.done .pv{color:var(--good)}
  /* quién debe a quién (simplificado) */
  .callout{display:flex;gap:11px;align-items:flex-start;background:rgba(7,212,161,.1);border:1px solid rgba(7,212,161,.32);border-radius:14px;padding:13px 15px;margin-bottom:12px;font-size:13.5px;color:var(--sea)}
  .callout .ci{color:#0a9d78;flex:0 0 auto;margin-top:1px}
  .settle{display:flex;align-items:center;gap:9px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 15px;box-shadow:var(--shadow);margin-bottom:10px}
  .settle .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-weight:700;font-family:'Fraunces';font-size:14px;color:#05323f;flex:0 0 auto}
  .settle .ar{color:var(--muted);flex:0 0 auto;display:grid;place-items:center}
  .settle .slbl{flex:1;min-width:0;font-size:13.5px;margin-left:3px}
  .settle .samt{font-family:'Fraunces';font-weight:700;font-size:18px;color:var(--sea);white-space:nowrap}
  .detail{margin-top:4px}
  .detail-h{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--aegean);font-weight:600;font-size:13px;padding:6px 2px}
  .detail-h .chev{transition:.25s}
  .detail.open .detail-h .chev{transform:rotate(180deg)}
  .detail-b{display:none;margin-top:8px}
  .detail.open .detail-b{display:block}

  /* ---------- Food ---------- */
  .meal{margin-bottom:12px}

const $ = s => document.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const cityBadge = c => `<span class="badge-city" style="background:${CITY[c].c}">${CITY[c].n}</span>`;
const eur = n => (n<0?'−':'')+Math.abs(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
const photo = (key, alt) => `<img class="ph" loading="lazy" decoding="async" src="img/${key}.jpg" alt="${alt}" onload="this.classList.add('loaded')">`;
const mapsUrl = q => 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(q);
const mapBtn = (q,label) => `<a class="mapbtn" href="${mapsUrl(q)}" target="_blank" rel="noopener">${I.pin} ${label||'Ver en mapa'}</a>`;
const dirUrl = (pts, mode) => {
  if(!pts || pts.length<2) return null;
  const enc = s => encodeURIComponent(s);
  const origin=enc(pts[0].q), dest=enc(pts[pts.length-1].q);
  const mid=pts.slice(1,-1).map(p=>enc(p.q)).join('|');
  let u=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=${mode||'walking'}`;
  if(mid) u+=`&waypoints=${mid}`;
  return u;
};
function loadState(key){try{return JSON.parse(localStorage.getItem(key))||{};}catch(e){return {};}}
function saveState(key,obj){localStorage.setItem(key,JSON.stringify(obj));}

/* dates (with ?d=YYYY-MM-DD override for testing) */
function parseDM(dm){ const [d,m]=dm.split('/').map(Number); return new Date(2026, m-1, d); }
function todayDate(){ const p=new URLSearchParams(location.search).get('d'); const t=p?new Date(p+'T09:00:00'):new Date(); t.setHours(0,0,0,0); return t; }
function tripDayIndex(){ const tm=todayDate().getTime(); return ITIN.findIndex(d=>parseDM(d.date).getTime()===tm); }
function daysToStart(){ return Math.round((parseDM(ITIN[0].date)-todayDate())/86400000); }
const mealByDate = {}; MEALS.forEach(m=>mealByDate[m.date]=m);
const flightByDate = {}; FLIGHTS.forEach(f=>{ (flightByDate[f.date]=flightByDate[f.date]||[]).push(f); });
const hotelByName = {}; HOTELS.forEach(h=>hotelByName[h.name]=h);
const monName = mm => ['','ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][parseInt(mm)];

/* check counters for Hoy */
function checkCount(items,key,hasDefaults){
  const st=loadState(key); let done=0;
  items.forEach((it,i)=>{ const id=key+'_'+i; const c=(id in st)?st[id]:(hasDefaults?!!it.done:false); if(c)done++; });
  return {done,total:items.length,pending:items.length-done};
}
function pendingPay(){
  const st=loadState('trip_pagos'); let pend=0;
  PAYMENTS.forEach((p,i)=>{ const id='trip_pagos_'+i; const paid=(id in st)?st[id]:(p.st==='Pagado'); if(!paid) pend+=p.val; });
  return pend;
}

/* ============== COUNTDOWN ============== */
function countdown(){
  const dep=parseDM(ITIN[0].date), now=todayDate();
  const back=parseDM(ITIN[ITIN.length-1].date);
  const diff=Math.round((dep-now)/86400000);
  const num=$('#cdNum'), lbl=$('#cdLbl'), pre=$('#cdPre');
  const setPre = t => { pre.textContent=t; pre.style.display=t?'block':'none'; };
  if(now>=dep && now<=back){ setPre(''); num.textContent='✈'; num.style.fontSize='22px'; lbl.textContent='¡en ruta!'; }
  else if(diff>0){ setPre('faltan'); num.textContent=diff; lbl.textContent=diff===1?'día':'días'; }
  else if(diff===0){ setPre(''); num.textContent='¡Hoy!'; num.style.fontSize='15px'; lbl.textContent='salida'; }
  else { setPre(''); num.textContent='♥'; lbl.textContent='vuelta'; }
}

  const v=$('#v-hoy'); v.innerHTML='';
  const idx=tripDayIndex();
  const before = todayDate() < parseDM(ITIN[0].date);
  const after = todayDate() > parseDM(ITIN[ITIN.length-1].date);

  if(idx>=0){ renderHoyTrip(v, idx); }
  else if(before){ renderHoyBefore(v); }
  else { renderHoyAfter(v); }
}

/* ============== DINERO ============== */
function renderMoney(){
  const v=$('#v-dinero'); v.innerHTML='';
  v.appendChild(el('div','sec-title','Presupuesto total'));
  const tb=el('div','total-bar');
  tb.innerHTML=`<div><div class="tt">Total estimado</div><small>3 personas · 13 días</small></div>
    <div style="text-align:right"><div class="tv">6.116 €</div><small>2.039 € por persona</small></div>`;
  v.appendChild(tb);
  const bc=el('div','card');
  BUDGET.forEach(b=>bc.appendChild(el('div','bud',
    `<div class="bic">${b.ic}</div><div class="bn">${b.cat}<span>${b.n}</span></div><div class="bv">${b.v}</div>`)));
  v.appendChild(bc);

  v.appendChild(el('div','sec-title','Quién paga a quién'));
  // liquidación mínima: cada deudor paga a quien tiene saldo a favor
  function settle(bal){
    const cred=bal.filter(b=>b.saldo<0).map(b=>({name:b.name,amt:-b.saldo}));
    const deb=bal.filter(b=>b.saldo>0).map(b=>({name:b.name,amt:b.saldo}));
    const res=[]; let i=0,j=0;
    while(i<deb.length && j<cred.length){
      const m=Math.min(deb[i].amt,cred[j].amt);
      if(m>0.005) res.push({from:deb[i].name,to:cred[j].name,amt:Math.round(m*100)/100});
      deb[i].amt-=m; cred[j].amt-=m;
      if(deb[i].amt<0.005)i++; if(cred[j].amt<0.005)j++;
    }
    return res;
  }
  const colors={Paula:'#d39a3e',Cecilia:'#d98a6a',Javiera:'#22b4c4'};
  // usa el bloque "neto" de la hoja si está; si no, calcula la liquidación mínima
  const moves=(typeof SETTLEMENT!=='undefined' && SETTLEMENT.length)?SETTLEMENT:settle(BALANCES);
  const debtors=[...new Set(moves.map(m=>m.from))];
  const recv=[...new Set(moves.map(m=>m.to))];
  const insight = debtors.length===1
    ? `Solo <b>${debtors[0]}</b> tiene que pagar. Con ${moves.length===1?'esta transferencia':'estas '+moves.length+' transferencias'} queda todo saldado, y ${recv.join(' y ')} no se deben nada entre ellas.`
    : `Estas son las transferencias pendientes para dejar la cuenta a cero (ya cuenta lo que cada una ha adelantado).`;
  v.appendChild(el('div','callout',`<span class="ci">${I.check}</span><div>${insight}</div>`));
  moves.forEach(m=>{
    v.appendChild(el('div','settle',
      `<i class="av" style="background:${colors[m.from]||'#5d7681'}">${m.from[0]}</i>
       <span class="ar">${I.chevR}</span>
       <i class="av" style="background:${colors[m.to]||'#5d7681'}">${m.to[0]}</i>
       <div class="slbl"><b>${m.from}</b> paga a <b>${m.to}</b>${m.note?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${m.note}</div>`:''}</div>
       <div class="samt">${eur(m.amt)}</div>`));
  });
  // detalle del reparto (colapsable)
  const det=el('div','detail');
  det.innerHTML=`<div class="detail-h">${I.chev} Ver el detalle del reparto</div><div class="detail-b"></div>`;
  const db=det.querySelector('.detail-b');
  db.appendChild(el('div','sub','Lo que le toca a cada una (su tercio del total) frente a lo que ya ha adelantado.'));
  BALANCES.forEach(b=>{
    const cls=b.saldo>0?'owe':'get'; const txt=b.saldo>0?'tiene que poner':'recupera';
    db.appendChild(el('div','balcard',
      `<i style="background:${colors[b.name]}">${b.name[0]}</i>
       <div class="nm"><b>${b.name}</b><span>Le toca ${b.toca} · ha puesto ${b.puesto}</span></div>
       <div class="amt ${cls}">${eur(Math.abs(b.saldo))}<div style="font-size:10px;font-weight:600;color:var(--muted);font-family:Inter">${txt}</div></div>`));
  });
  det.querySelector('.detail-h').onclick=()=>det.classList.toggle('open');
  v.appendChild(det);

  v.appendChild(el('div','sec-title','Estado de pagos'));
  v.appendChild(el('div','sub','Marca lo que ya está pagado. Se guarda en este móvil y el resumen se recalcula solo.'));
  const KEY='trip_pagos';
  const state=loadState(KEY);
  const isPaid=(p,i)=>{const id=KEY+'_'+i;return (id in state)?state[id]:(p.st==='Pagado');};
  const sum=el('div','paysum');
  sum.innerHTML=`<div class="bar"><i></i></div>
    <div class="legend"><span class="paid"><span class="k">Pagado</span><b></b></span>
    <span class="pend" style="text-align:right"><span class="k">Pendiente</span><b></b></span></div>`;
  v.appendChild(sum);
  const fill=sum.querySelector('.bar i'), paidB=sum.querySelector('.paid b'), pendB=sum.querySelector('.pend b');
  function updateSum(){
    let paid=0,total=0;
    PAYMENTS.forEach((p,i)=>{ total+=p.val; if(isPaid(p,i)) paid+=p.val; });
    paidB.textContent=eur(paid); pendB.textContent=eur(total-paid);
    fill.style.width=(total?(paid/total*100):0)+'%';
  }
  const pc=el('div','card flat');
  PAYMENTS.forEach((p,i)=>{
    const id=KEY+'_'+i;
    const row=el('div','paychk'+(isPaid(p,i)?' done':''));
    row.innerHTML=`<div class="box">${checkSVG}</div>
      <div class="pc"><b>${p.c}</b><span>${p.by!=='—'?'Pagado por '+p.by+' · ':''}${p.n}</span></div>
      <div class="pv">${p.amt}</div>`;
    row.onclick=()=>{ const now=!row.classList.contains('done'); row.classList.toggle('done',now); state[id]=now; saveState(KEY,state); updateSum(); renderHoy(); };
    pc.appendChild(row);
  });
  v.appendChild(pc); updateSum();
}

function renderCheckList(view, items, key, hasDefaults){
  const state=loadState(key);
  const wrap=el('div','card flat');
  const bar=el('div','progress'); const fill=el('i'); bar.appendChild(fill);
  const counter=el('div','sub');
  function update(){
    let done=0;
    items.forEach((it,i)=>{ const id=key+'_'+i; if((id in state)?state[id]:(hasDefaults?!!it.done:false)) done++; });
    const pct=Math.round(done/items.length*100); fill.style.width=pct+'%';
    counter.textContent=`${done} de ${items.length} · ${pct}%`;
  }
  items.forEach((it,i)=>{
    const id=key+'_'+i;
    const checked=(id in state)?state[id]:(hasDefaults?!!it.done:false);
    const row=el('div','chk'+(checked?' done':''));
    row.innerHTML=`<div class="box">${checkSVG}</div>
      <div class="ct"><b>${it.t}</b>${it.n?`<span>${it.n}</span>`:''}</div>
      <span class="cat">${it.cat}</span>`;
    row.onclick=()=>{ const now=!row.classList.contains('done'); row.classList.toggle('done',now); state[id]=now; saveState(key,state); update(); renderHoy(); };
    wrap.appendChild(row);
  });
  view.appendChild(bar); view.appendChild(counter); view.appendChild(wrap);
  const reset=el('button','reset','Reiniciar esta lista');
  reset.onclick=()=>{ if(confirm('¿Reiniciar las marcas de esta lista?')){localStorage.removeItem(key);renderListas();renderHoy();} };
  view.appendChild(reset); update();
}

/* ============== CONVERSOR ============== */
function renderConversor(){
  const v=$('#v-conversor'); v.innerHTML=backbar('mas');
  v.appendChild(el('div','sec-title','Conversor de moneda'));
  const RKEY='trip_rates';
  const rates=Object.assign({CLP:1044,TRY:38}, loadState(RKEY)); // por 1 €
  let from='EUR', amount=10;
  const conv=el('div','conv');
  conv.innerHTML=`
    <div class="seg">
      <button data-c="EUR">EUR €</button><button data-c="TRY">Lira ₺</button><button data-c="CLP">Peso $</button>
    </div>
    <input class="amt-in" type="number" inputmode="decimal" value="10">
    <div class="out"></div>`;
  v.appendChild(conv);
  const out=conv.querySelector('.out');
  const inp=conv.querySelector('.amt-in');
  const per={EUR:1, TRY:rates.TRY, CLP:rates.CLP};
  function fmt(c,val){
    if(c==='CLP') return '$'+Math.round(val).toLocaleString('es-CL');
    if(c==='TRY') return '₺'+val.toLocaleString('es-ES',{maximumFractionDigits:2});
    return val.toLocaleString('es-ES',{maximumFractionDigits:2})+' €';
  }
  function calc(){
    per.TRY=rates.TRY; per.CLP=rates.CLP;
    const eurVal=(amount||0)/per[from];
    const others=['EUR','TRY','CLP'].filter(c=>c!==from);
    out.innerHTML=others.map(c=>`<div class="orow"><span class="ol">${({EUR:'Euro',TRY:'Lira turca',CLP:'Peso chileno'})[c]}</span><span class="ov">${fmt(c,eurVal*per[c])}</span></div>`).join('');
  }
  conv.querySelectorAll('.seg button').forEach(b=>{
    if(b.dataset.c===from) b.classList.add('on');
    b.onclick=()=>{ from=b.dataset.c; conv.querySelectorAll('.seg button').forEach(x=>x.classList.toggle('on',x===b)); calc(); };
  });
  inp.oninput=()=>{ amount=parseFloat(inp.value); calc(); };
  calc();

  // tipos editables
  v.appendChild(el('div','sec-title','Tipos de cambio'));
  v.appendChild(el('div','sub','La lira es aproximada: edítala con el tipo real antes o durante el viaje. Se guarda en este móvil.'));
  const rc=el('div','card rates');
  rc.innerHTML=`
    <label>1 € = <span style="margin-left:auto"></span><input id="rTRY" type="number" inputmode="decimal" value="${rates.TRY}"> ₺ (lira)</label>
    <label>1 € = <span style="margin-left:auto"></span><input id="rCLP" type="number" inputmode="decimal" value="${rates.CLP}"> $ (CLP)</label>`;
  v.appendChild(rc);
  rc.querySelector('#rTRY').oninput=e=>{ rates.TRY=parseFloat(e.target.value)||rates.TRY; saveState(RKEY,{TRY:rates.TRY,CLP:rates.CLP}); calc(); };
  rc.querySelector('#rCLP').oninput=e=>{ rates.CLP=parseFloat(e.target.value)||rates.CLP; saveState(RKEY,{TRY:rates.TRY,CLP:rates.CLP}); calc(); };
}

/* ============== FRASES ============== */
function renderFrases(){
  const v=$('#v-frases'); v.innerHTML=backbar('mas');
  v.appendChild(el('div','sec-title','Frases útiles'));
  v.appendChild(el('div','sub','En cursiva, cómo se pronuncia aproximadamente.'));
  Object.entries(PHRASES).forEach(([title,arr])=>{
    const card=el('div','card');
    card.appendChild(el('div','',`<div style="font-family:Fraunces;font-weight:700;font-size:16px;color:var(--sea);margin-bottom:6px">${title}</div>`));
    arr.forEach(p=>card.appendChild(el('div','phrase',
      `<div class="pes">${p.es}</div><div class="pt"><b>${p.t}</b><span>${p.p}</span></div>`)));
    v.appendChild(card);
  });
}

/* ============== OFFLINE INDICATOR ============== */
function updateOnline(){
  $('#offlineBar').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnline);
window.addEventListener('offline', updateOnline);

/* ============== INIT ============== */
countdown();
renderHoy();
renderPlan();
renderLog();
renderMoney();
renderFood();
renderListas();
renderInfo();
renderMas();
renderConversor();
renderFrases();
updateOnline();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
