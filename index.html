<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="googlebot" content="noindex, nofollow">
<meta name="referrer" content="no-referrer">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a3d52">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Viaje 2026">
<title>Estambul · Capadocia · Atenas · Naxos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sea:#0a3d52; --sea2:#125a78; --aegean:#1b8aa6; --turq:#22b4c4;
    --sand:#f6efe2; --paper:#fbf7ef; --ink:#10242c; --muted:#5d7681;
    --line:rgba(10,61,82,.12); --gold:#d39a3e; --rose:#d98a6a;
    --good:#1f9d76; --bad:#d05a4e; --warn:#cf8a2c;
    --card:#ffffff; --shadow:0 6px 24px rgba(10,61,82,.10);
    --safe-b:env(safe-area-inset-bottom,0px);
    --safe-t:env(safe-area-inset-top,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding-bottom:calc(74px + var(--safe-b));
  }
  h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}
  a{color:var(--aegean);text-decoration:none}

  /* ---------- Header ---------- */
  header{
    position:sticky;top:0;z-index:40;
    background:linear-gradient(160deg,#0a3d52,#125a78);
    color:#fff;padding:calc(14px + var(--safe-t)) 0 0;
    box-shadow:0 4px 18px rgba(10,61,82,.25);
  }
  .head-inner{padding:0 18px 12px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand .eyebrow{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:#9fd6e2;font-weight:600}
  .brand h1{font-size:19px;margin:2px 0 0;font-weight:600;line-height:1.15}
  .count{
    text-align:right;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
    border-radius:14px;padding:7px 12px;min-width:74px;backdrop-filter:blur(4px)
  }
  .count .num{font-family:'Fraunces',serif;font-size:24px;font-weight:700;line-height:1}
  .count .lbl{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#cdeaf1}

  /* pill nav */
  nav.tabs{display:flex;gap:6px;overflow-x:auto;padding:0 14px 12px;scrollbar-width:none}
  nav.tabs::-webkit-scrollbar{display:none}
  nav.tabs button{
    flex:0 0 auto;border:0;background:rgba(255,255,255,.12);color:#dff0f4;
    font-family:inherit;font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;
    cursor:pointer;white-space:nowrap;transition:.15s;display:flex;align-items:center;gap:6px
  }
  nav.tabs button.on{background:var(--turq);color:#05323f;box-shadow:0 2px 10px rgba(34,180,196,.45)}

  /* ---------- Layout ---------- */
  main{max-width:680px;margin:0 auto;padding:16px 16px 40px}
  .view{display:none;animation:fade .25s ease}
  .view.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .sec-title{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--aegean);font-weight:700;margin:22px 2px 10px}
  .sec-title:first-child{margin-top:4px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px 16px;box-shadow:var(--shadow);margin-bottom:12px}
  .card.flat{box-shadow:none}

  .pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;letter-spacing:.02em}
  .pill.ok{background:rgba(31,157,118,.13);color:var(--good)}
  .pill.pend{background:rgba(207,138,44,.15);color:var(--warn)}
  .pill.info{background:rgba(27,138,166,.12);color:var(--aegean)}
  .pill.pay{background:rgba(31,157,118,.13);color:var(--good)}

  /* ---------- Hero (Inicio) ---------- */
  .hero{
    border-radius:20px;overflow:hidden;position:relative;color:#fff;
    background:linear-gradient(150deg,#0a3d52 0%,#125a78 55%,#1b8aa6 100%);
    padding:22px 20px 20px;box-shadow:var(--shadow);margin-bottom:16px
  }
  .hero::after{content:"";position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(34,180,196,.45),transparent 70%)}
  .hero .route{font-family:'Fraunces',serif;font-size:23px;font-weight:600;line-height:1.2;position:relative}
  .hero .dates{margin-top:8px;font-size:13px;color:#cdeaf1;font-weight:500;position:relative}
  .hero .who{margin-top:14px;display:flex;gap:8px;position:relative;flex-wrap:wrap}
  .ava{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.18);padding:5px 11px 5px 5px;border-radius:999px;font-size:12.5px;font-weight:600}
  .ava i{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-style:normal;font-size:11px;font-weight:700;color:#05323f}

  .budget-hero{background:linear-gradient(135deg,#0a3d52,#1b8aa6);color:#fff;border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);margin-bottom:16px;position:relative;overflow:hidden}
  .budget-hero::after{content:"";position:absolute;right:-30px;bottom:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(7,212,161,.4),transparent 70%)}
  .budget-hero>*{position:relative}
  .budget-hero .bh-top{display:flex;justify-content:space-between;align-items:center}
  .budget-hero .bh-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#cdeaf1;font-weight:600}
  .budget-hero .bh-rate{font-size:10.5px;color:#cdeaf1;background:rgba(255,255,255,.14);padding:3px 9px;border-radius:8px;font-weight:600}
  .budget-hero .bh-clp{font-family:'Fraunces',serif;font-size:33px;font-weight:700;line-height:1.05;margin-top:7px}
  .budget-hero .bh-eur{font-size:12.5px;color:#cdeaf1;margin-top:3px}
  .budget-hero .bh-pp{margin-top:12px;padding-top:11px;border-top:1px solid rgba(255,255,255,.18);font-size:13px;color:#eaf6f9;display:flex;align-items:baseline;gap:7px}
  .budget-hero .bh-pp b{font-family:'Fraunces',serif;font-size:17px}
  .budget-hero .bh-pp .sec{color:#bfe3ec;margin-left:auto;font-size:12px}
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 12px;text-align:center;box-shadow:var(--shadow)}
  .stat .v{font-family:'Fraunces',serif;font-size:21px;font-weight:700;color:var(--sea)}
  .stat .k{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-top:3px;font-weight:600}

  .leg{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .leg:last-child{border-bottom:0}
  .leg .dot{flex:0 0 auto;width:34px;height:34px;border-radius:11px;display:grid;place-items:center;color:#fff;font-family:'Fraunces',serif;font-weight:700;font-size:13px}
  .leg .m{flex:1}
  .leg .m b{font-size:14.5px}
  .leg .m span{display:block;font-size:12px;color:var(--muted);margin-top:1px}
  .leg .n{font-size:11px;color:var(--muted);text-align:right;white-space:nowrap;padding-top:3px}

  .next li{list-style:none}
  .next ul{margin:0;padding:0}
  .next li{display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
  .next li:last-child{border-bottom:0}
  .next .tag{flex:0 0 auto;font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;background:var(--rose);padding:3px 8px;border-radius:7px;margin-top:1px}

  /* ---------- Itinerary ---------- */
  .day{margin-bottom:14px;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--card)}
  .day-head{display:flex;align-items:center;gap:12px;padding:13px 15px;cursor:pointer;background:linear-gradient(100deg,rgba(27,138,166,.06),transparent)}
  .day-head .date{flex:0 0 auto;text-align:center;background:var(--sea);color:#fff;border-radius:12px;padding:6px 9px;min-width:46px}
  .day-head .date .d{font-family:'Fraunces',serif;font-size:18px;font-weight:700;line-height:1}
  .day-head .date .mo{font-size:9.5px;text-transform:uppercase;letter-spacing:.08em;color:#bfe3ec}
  .day-head .ti{flex:1;min-width:0}
  .day-head .ti b{font-size:15px;display:flex;align-items:center;gap:7px}
  .day-head .ti span{font-size:11.5px;color:var(--muted);display:block;margin-top:2px}
  .day-head .chev{transition:.25s;color:var(--aegean);flex:0 0 auto}
  .day.open .chev{transform:rotate(180deg)}
  .day-body{display:none;padding:4px 15px 14px}
  .day.open .day-body{display:block}
  .slot{display:flex;gap:11px;padding:9px 0;border-top:1px solid var(--line)}
  .slot .ic{flex:0 0 auto;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:rgba(27,138,166,.1);color:var(--aegean)}
  .slot .tx{flex:1;font-size:13.5px}
  .slot .tx b{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);display:block;font-weight:700}
  .daynote{margin-top:11px;font-size:12.5px;color:var(--sea2);background:rgba(27,138,166,.07);border-left:3px solid var(--aegean);padding:9px 11px;border-radius:0 10px 10px 0}
  .badge-city{font-size:10px;font-weight:700;letter-spacing:.04em;color:#fff;padding:2px 8px;border-radius:7px}

  /* ---------- Flight / hotel cards ---------- */
  .fcard{position:relative}
  .froute{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .froute .ap{font-family:'Fraunces',serif;font-size:21px;font-weight:700}
  .froute .arr{flex:1;height:1px;background:linear-gradient(90deg,var(--line),var(--aegean),var(--line));position:relative}
  .froute .arr::after{content:"✈";position:absolute;right:-2px;top:-10px;color:var(--aegean);font-size:14px}
  .froute .arr .plus{position:absolute;left:50%;top:-9px;transform:translateX(-50%);font-size:10px;color:var(--muted);background:var(--card);padding:0 5px}
  .ftimes{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:10px}
  .ftimes b{color:var(--ink);font-size:13px}
  .fmeta{display:flex;flex-wrap:wrap;gap:7px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);padding-top:9px}
  .fmeta b{color:var(--ink)}
  .hotel .hh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .hotel .hh h3{margin:0;font-size:17px}
  .hotel .stay{font-size:12px;color:var(--muted);margin-top:3px}
  .hotel .feat{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .feat .t{font-size:11.5px;background:rgba(10,61,82,.05);border:1px solid var(--line);padding:4px 9px;border-radius:8px;color:var(--sea2)}
  .booklink{display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-size:13px;font-weight:600;background:rgba(27,138,166,.1);padding:8px 13px;border-radius:10px}

  /* ---------- Money ---------- */
  .balcard{display:flex;align-items:center;gap:13px;padding:13px 15px;border-radius:14px;background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:10px}
  .balcard i{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;font-style:normal;font-weight:700;font-family:'Fraunces',serif;font-size:16px;color:#05323f;flex:0 0 auto}
  .balcard .nm{flex:1}
  .balcard .nm b{font-size:15px}
  .balcard .nm span{display:block;font-size:11.5px;color:var(--muted);margin-top:1px;max-width:32ch}
  .balcard .amt{text-align:right;font-family:'Fraunces',serif;font-weight:700;font-size:16px;white-space:nowrap}
  .amt.owe{color:var(--bad)} .amt.get{color:var(--good)}
  .transfer{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .transfer:last-child{border-bottom:0}
  .transfer .ar{color:var(--aegean);font-weight:700}
  .transfer .tamt{margin-left:auto;font-weight:700;font-family:'Fraunces',serif;color:var(--sea)}
  .bud{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
  .bud:last-child{border-bottom:0}
  .bud .bic{width:30px;height:30px;border-radius:9px;background:rgba(27,138,166,.1);color:var(--aegean);display:grid;place-items:center;flex:0 0 auto}
  .bud .bn{flex:1;font-size:13.5px}
  .bud .bn span{display:block;font-size:11px;color:var(--muted)}
  .bud .bv{font-weight:700;font-family:'Fraunces',serif;font-size:14.5px;white-space:nowrap}
  .total-bar{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(120deg,#0a3d52,#1b8aa6);color:#fff;border-radius:14px;padding:14px 17px;margin-top:6px}
  .total-bar .tt{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#cdeaf1}
  .total-bar .tv{font-family:'Fraunces',serif;font-size:24px;font-weight:700}
  .total-bar small{display:block;font-size:11px;color:#bfe3ec;text-transform:none;letter-spacing:0}
  .payitem{display:flex;gap:10px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}
  .payitem:last-child{border-bottom:0}
  .payitem .pc{flex:1}
  .payitem .pc b{font-size:13.5px}
  .payitem .pc span{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
  .payitem .pv{text-align:right;white-space:nowrap}
  .payitem .pv b{font-family:'Fraunces',serif;font-size:14px}

  /* ---------- Food ---------- */
  .meal{margin-bottom:12px}
  .meal .mh{display:flex;align-items:center;gap:9px;margin-bottom:7px}
  .meal .mh .md{font-family:'Fraunces',serif;font-weight:700;font-size:15px;color:var(--sea)}
  .meal .mh .mc{font-size:11px;color:var(--muted)}
  .meal .row{display:flex;gap:10px;padding:7px 0;font-size:13px;border-top:1px solid var(--line)}
  .meal .row .lab{flex:0 0 58px;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--aegean);padding-top:2px}
  .dish{padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .dish:last-child{border-bottom:0}
  .dish b{display:block;font-size:13.5px}
  .dish span{font-size:12.5px;color:var(--muted)}

  /* ---------- Lists (check) ---------- */
  .progress{height:8px;border-radius:999px;background:rgba(10,61,82,.1);overflow:hidden;margin:6px 0 14px}
  .progress i{display:block;height:100%;background:linear-gradient(90deg,var(--turq),var(--good));transition:.4s}
  .chk{display:flex;gap:11px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
  .chk:last-child{border-bottom:0}
  .chk .box{flex:0 0 auto;width:22px;height:22px;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;transition:.15s;margin-top:1px;background:#fff}
  .chk.done .box{background:var(--good);border-color:var(--good)}
  .chk .box svg{opacity:0;transition:.15s}
  .chk.done .box svg{opacity:1}
  .chk .ct{flex:1;font-size:14px}
  .chk .ct span{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}
  .chk.done .ct b{text-decoration:line-through;color:var(--muted)}
  .chk .cat{font-size:9.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--aegean);background:rgba(27,138,166,.1);padding:2px 7px;border-radius:6px;flex:0 0 auto;margin-top:2px}
  .reset{display:block;margin:14px auto 0;background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:12px;padding:7px 16px;border-radius:999px;cursor:pointer}

  /* ---------- Info ---------- */
  .note{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .note:last-child{border-bottom:0}
  .note .ni{flex:0 0 auto;color:var(--aegean);margin-top:1px}
  .contact{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .contact:last-child{border-bottom:0}
  .contact .ci{width:38px;height:38px;border-radius:11px;background:rgba(27,138,166,.1);color:var(--aegean);display:grid;place-items:center;flex:0 0 auto}
  .contact .cd{flex:1;min-width:0}
  .contact .cd b{font-size:13.5px}
  .contact .cd span{display:block;font-size:11.5px;color:var(--muted)}
  .contact .cact{display:flex;gap:8px}
  .contact .cact a{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;background:var(--sea);color:#fff}
  .ferry{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .ferry:last-child{border-bottom:0}
  .ferry b{flex:1}
  .ferry .fp{font-weight:700;font-family:'Fraunces',serif;color:var(--sea)}
  .ferry .ft{font-size:11.5px;color:var(--muted)}
  .act{padding:10px 0;border-bottom:1px solid var(--line)}
  .act:last-child{border-bottom:0}
  .act b{font-size:14px}
  .act p{margin:3px 0 0;font-size:12.5px;color:var(--muted)}

  /* ---------- Photos ---------- */
  img.ph{background:rgba(10,61,82,.06);opacity:0;transition:opacity .4s ease}
  img.ph.loaded{opacity:1}
  /* destino con foto de cabecera (Inicio) */
  .rcard{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:12px;background:var(--card)}
  .rcard .cover{position:relative;height:130px;overflow:hidden}
  .rcard .cover img{width:100%;height:100%;object-fit:cover;display:block}
  .rcard .cover::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,36,44,.05) 30%,rgba(10,36,44,.78))}
  .rcard .ov{position:absolute;left:14px;bottom:10px;right:14px;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;z-index:2}
  .rcard .ov .nm{color:#fff}
  .rcard .ov .nm .num{font-family:'Fraunces',serif;font-size:12px;font-weight:700;opacity:.85;letter-spacing:.04em}
  .rcard .ov .nm b{font-family:'Fraunces',serif;font-size:22px;font-weight:600;display:block;line-height:1.05;text-shadow:0 1px 8px rgba(0,0,0,.35)}
  .rcard .ov .when{color:#fff;text-align:right;font-size:11px;font-weight:600;background:rgba(0,0,0,.28);padding:4px 9px;border-radius:8px;backdrop-filter:blur(3px);white-space:nowrap}
  .rcard .desc{padding:10px 14px 13px;font-size:12.5px;color:var(--muted)}
  /* miniatura en lista (sitios y platos) */
  .thumb{flex:0 0 auto;width:74px;height:74px;border-radius:12px;overflow:hidden;background:rgba(10,61,82,.06)}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .act.hasimg,.dish.hasimg{display:flex;gap:12px;align-items:flex-start}
  .act.hasimg .meta,.dish.hasimg .meta{flex:1;min-width:0}

  .sub{font-size:12.5px;color:var(--muted);margin:-4px 2px 12px}
  .footer{text-align:center;font-size:11px;color:var(--muted);margin-top:30px;padding-top:16px;border-top:1px solid var(--line)}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div class="brand">
      <div class="eyebrow">Turquía & Grecia · 2026</div>
      <h1 id="headTitle">Estambul · Capadocia<br>Atenas · Naxos</h1>
    </div>
    <div class="count">
      <div class="lbl" id="cdPre">faltan</div>
      <div class="num" id="cdNum">–</div>
      <div class="lbl" id="cdLbl">días</div>
    </div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<main>
  <section class="view on" id="v-inicio"></section>
  <section class="view" id="v-plan"></section>
  <section class="view" id="v-logistica"></section>
  <section class="view" id="v-dinero"></section>
  <section class="view" id="v-comida"></section>

/* ============== COUNTDOWN ============== */
function countdown(){
  const now=new Date(); now.setHours(0,0,0,0);
  const dep=new Date(TRIP.start+'T00:00:00');
  const back=new Date(TRIP.end+'T23:59:59');
  const diff=Math.round((dep-now)/86400000);
  const num=$('#cdNum'), lbl=$('#cdLbl'), pre=$('#cdPre');
  const setPre = t => { pre.textContent=t; pre.style.display=t?'block':'none'; };
  if(now>=dep && now<=back){ setPre(''); num.textContent='✈'; lbl.textContent='¡en ruta!'; }
  else if(diff>0){ setPre('faltan'); num.textContent=diff; lbl.textContent=diff===1?'día':'días'; }
  else if(diff===0){ setPre(''); num.textContent='¡Hoy!'; num.style.fontSize='17px'; lbl.textContent='salida'; }
  else { setPre(''); num.textContent='♥'; lbl.textContent='vuelta'; }
}
countdown();

/* ============== LISTAS (interactive) ============== */
function checkSVG(){return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';}
function loadState(key){try{return JSON.parse(localStorage.getItem(key))||{};}catch(e){return {};}}
function saveState(key,obj){localStorage.setItem(key,JSON.stringify(obj));}

function renderCheckList(view, items, key, hasDefaults){
  const state=loadState(key);
  const wrap=el('div','card flat');
  const bar=el('div','progress'); const fill=el('i'); bar.appendChild(fill);
  const counter=el('div','sub');
  function update(){
    let done=0;
    items.forEach((it,i)=>{
      const id=key+'_'+i;
      let checked = (id in state)? state[id] : (hasDefaults? !!it.done : false);
      if(checked) done++;
    });
    const pct=Math.round(done/items.length*100);
    fill.style.width=pct+'%';
    counter.textContent=`${done} de ${items.length} · ${pct}%`;
  }
  items.forEach((it,i)=>{
    const id=key+'_'+i;
    let checked = (id in state)? state[id] : (hasDefaults? !!it.done : false);
    const row=el('div','chk'+(checked?' done':''));
    row.innerHTML=`<div class="box">${checkSVG()}</div>
      <div class="ct"><b>${it.t}</b>${it.n?`<span>${it.n}</span>`:''}</div>
      <span class="cat">${it.cat}</span>`;
    row.onclick=()=>{
      const now=!row.classList.contains('done');
      row.classList.toggle('done',now);
      state[id]=now; saveState(key,state); update();
    };
    wrap.appendChild(row);
  });
  view.appendChild(bar);
  view.appendChild(counter);
  view.appendChild(wrap);
  const reset=el('button','reset','Reiniciar esta lista');
  reset.onclick=()=>{ if(confirm('¿Reiniciar las marcas de esta lista?')){localStorage.removeItem(key);renderListas(true);} };
  view.appendChild(reset);
  update();
}
function renderListas(force){
  const v=$('#v-listas');
  if(force) v.innerHTML='';
  v.appendChild(el('div','sec-title','Checklist de tareas'));
  v.appendChild(el('div','sub','Se guarda en este móvil. Pendientes de la hoja marcadas según su estado.'));
  renderCheckList(v, TASKS, 'trip_tasks', true);
  v.appendChild(el('div','sec-title','Maleta'));
  renderCheckList(v, PACK, 'trip_pack', false);
}
